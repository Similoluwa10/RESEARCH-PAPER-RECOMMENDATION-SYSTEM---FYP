# TF-IDF Baseline Configuration

name: "tfidf_baseline"
description: "TF-IDF based text similarity baseline"

# Vectorizer configuration
vectorizer:
  max_features: 10000
  ngram_range: [1, 2]
  min_df: 2
  max_df: 0.95
  stop_words: "english"

# Search parameters
search:
  top_k: 10
  similarity_metric: "cosine"

# Preprocessing
preprocessing:
  lowercase: true
  remove_urls: true
  remove_citations: true

# Evaluation
evaluation:
  k_values: [1, 3, 5, 10, 20]
  metrics:
    - precision
    - recall
    - f1
    - map
    - mrr
