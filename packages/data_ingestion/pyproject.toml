[project]
name = "research-recommender-data-ingestion"
version = "0.1.0"
description = "Data ingestion components for Research Paper Recommendation System"
requires-python = ">=3.11"
authors = [
    {name = "DevWithSimiloluwa", email = "similoluwagbenle04@gmail.com"}
]

dependencies = [
    "requests>=2.31.0",
    "pyyaml>=6.0.1",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
